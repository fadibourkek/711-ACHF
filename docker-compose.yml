version: '3.9'

services:
  # ─── Infrastructure ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: achf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-711achf}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-711achf_secret}
      POSTGRES_DB: ${DB_NAME:-711_achf}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - achf_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardian"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: achf_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - achf_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: achf_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-711achf}:${DB_PASSWORD:-711achf_secret}@postgres:5432/${DB_NAME:-711_achf}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - achf_net
    volumes:
      - ./backend/uploads:/app/uploads

  # ─── Discord Bot ───────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: achf_bot
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:3001
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    depends_on:
      - backend
      - redis
    networks:
      - achf_net

  # ─── Dashboard ─────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: achf_dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${WS_URL:-ws://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - achf_net

  # ─── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: achf_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infra/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - dashboard
    networks:
      - achf_net

volumes:
  postgres_data:
  redis_data:

networks:
  achf_net:
    driver: bridge
